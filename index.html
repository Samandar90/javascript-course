<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript с нуля / noldan — интерактивный курс</title>
<style>
  :root{
    --bg:#0d1117; --bg2:#161b22; --bg3:#1c2330;
    --line:#2b3340; --text:#e6edf3; --muted:#9aa7b4;
    --accent:#f7df1e; --accent2:#58a6ff; --green:#3fb950; --red:#f85149;
    --code:#0b0f14; --shadow:0 10px 40px rgba(0,0,0,.45);
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.7;
    display:flex; min-height:100vh;
  }
  a{color:var(--accent2);text-decoration:none}

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:300px; background:var(--bg2); border-right:1px solid var(--line);
    height:100vh; position:sticky; top:0; overflow-y:auto; flex-shrink:0;
    padding:0 0 40px;
  }
  .brand{
    padding:22px 22px 16px; position:sticky; top:0; background:var(--bg2);
    border-bottom:1px solid var(--line); z-index:5;
  }
  .brand .logo{display:flex;align-items:center;gap:12px;font-weight:800;font-size:18px}
  .brand .badge{background:var(--accent);color:#000;font-weight:900;border-radius:8px;
    width:38px;height:38px;display:grid;place-items:center;font-size:16px}
  .brand p{color:var(--muted);font-size:12.5px;margin-top:8px}

  .lang{display:flex;gap:6px;margin-top:14px;background:var(--bg3);padding:4px;border-radius:10px}
  .lang button{flex:1;background:transparent;border:none;color:var(--muted);padding:8px;
    border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;transition:.15s}
  .lang button.active{background:var(--accent);color:#000}

  .progress-wrap{margin-top:14px}
  .progress-bar{height:7px;background:var(--bg3);border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--accent));transition:width .4s}
  .progress-text{font-size:11.5px;color:var(--muted);margin-top:6px}

  .nav{padding:10px 12px}
  .nav-group{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:16px 12px 6px;font-weight:700}
  .nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;
    color:var(--text);font-size:14px;cursor:pointer;transition:.15s}
  .nav a:hover{background:var(--bg3)}
  .nav a.active{background:var(--accent);color:#000;font-weight:700}
  .nav a .num{font-size:12px;opacity:.7;width:22px}
  .nav a.done::after{content:"✓";margin-left:auto;color:var(--green);font-weight:900}
  .nav a.active.done::after{color:#000}

  /* ---------- MAIN ---------- */
  .main{flex:1;min-width:0}
  .topbar{display:none;align-items:center;gap:12px;padding:12px 16px;
    background:var(--bg2);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .menu-btn{background:var(--bg3);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:8px 12px;font-size:18px;cursor:pointer}
  .content{max-width:920px;margin:0 auto;padding:46px 28px 120px}

  .lesson{display:none;animation:fade .35s ease}
  .lesson.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .kicker{color:var(--accent);font-weight:700;font-size:13px;letter-spacing:.05em;text-transform:uppercase}
  h1{font-size:38px;line-height:1.2;margin:8px 0 18px;font-weight:800}
  h2{font-size:25px;margin:38px 0 14px;font-weight:800;border-left:4px solid var(--accent);padding-left:14px}
  h3{font-size:19px;margin:26px 0 10px;font-weight:700;color:#fff}
  p{margin:12px 0;color:#d2dae3}
  ul,ol{margin:12px 0 12px 24px}
  li{margin:7px 0;color:#d2dae3}
  strong{color:#fff}
  .lead{font-size:18px;color:var(--muted)}

  .note,.tip,.warn{border-radius:12px;padding:14px 18px;margin:18px 0;border-left:4px solid;background:var(--bg2)}
  .note{border-color:var(--accent2)}
  .tip{border-color:var(--green)}
  .warn{border-color:var(--red)}
  .note b,.tip b,.warn b{display:block;margin-bottom:4px}

  code.inline{background:var(--bg3);padding:2px 7px;border-radius:6px;font-family:"Consolas",monospace;font-size:14px;color:var(--accent)}

  pre{background:var(--code);border:1px solid var(--line);border-radius:12px;
    padding:16px 18px;overflow-x:auto;margin:16px 0;font-size:14.5px;
    font-family:"Consolas","Courier New",monospace;line-height:1.6}
  .tok-key{color:#ff7b72}.tok-str{color:#a5d6ff}.tok-num{color:#79c0ff}
  .tok-com{color:#8b949e;font-style:italic}.tok-fn{color:#d2a8ff}.tok-bool{color:#79c0ff}

  .play{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin:22px 0;box-shadow:var(--shadow)}
  .play-head{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--line);font-size:13px;color:var(--muted)}
  .dot{width:11px;height:11px;border-radius:50%}
  .dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .play-head .title{margin-left:8px;font-weight:600}
  .play-head .run{margin-left:auto;background:var(--green);color:#fff;border:none;
    padding:7px 16px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px}
  .play-head .run:hover{filter:brightness(1.1)}
  .play-head .reset{background:transparent;border:1px solid var(--line);color:var(--muted);
    padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px}
  .editor{width:100%;background:var(--code);color:#e6edf3;border:none;outline:none;
    font-family:"Consolas","Courier New",monospace;font-size:14.5px;line-height:1.6;
    padding:16px 18px;resize:vertical;min-height:120px;display:block;tab-size:2;white-space:pre}
  .console{background:#06090d;border-top:1px solid var(--line);padding:14px 18px;
    font-family:"Consolas",monospace;font-size:14px;min-height:48px;color:#c9d1d9}
  .console .clabel{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
  .console .line{white-space:pre-wrap;padding:2px 0;border-bottom:1px dashed #131a22}
  .console .err{color:var(--red)}
  .console .empty{color:#4d5b6a;font-style:italic}

  .quiz{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:22px;margin:24px 0}
  .quiz h3{margin-top:0}
  .q{margin:18px 0}
  .q .qtext{font-weight:600;margin-bottom:10px}
  .opt{display:block;padding:11px 14px;border:1px solid var(--line);border-radius:10px;
    margin:8px 0;cursor:pointer;transition:.15s;background:var(--bg3)}
  .opt:hover{border-color:var(--accent2)}
  .opt.correct{border-color:var(--green);background:rgba(63,185,80,.15)}
  .opt.wrong{border-color:var(--red);background:rgba(248,81,73,.12)}
  .opt input{margin-right:10px}
  .quiz-btn{background:var(--accent);color:#000;border:none;padding:11px 22px;border-radius:10px;
    font-weight:800;cursor:pointer;margin-top:8px;font-size:14px}
  .quiz-result{margin-top:14px;font-weight:700;display:none}

  .pager{display:flex;justify-content:space-between;gap:14px;margin-top:60px;border-top:1px solid var(--line);padding-top:26px}
  .pager button{flex:1;background:var(--bg2);border:1px solid var(--line);color:var(--text);
    padding:16px 20px;border-radius:14px;cursor:pointer;text-align:left;transition:.15s}
  .pager button:hover:not(:disabled){border-color:var(--accent);background:var(--bg3)}
  .pager button:disabled{opacity:.35;cursor:not-allowed}
  .pager .dir{font-size:12px;color:var(--muted)}
  .pager .ttl{font-weight:700;margin-top:3px}
  .pager .next{text-align:right}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin:18px 0}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:18px}
  .card .ico{font-size:26px}
  .card h4{margin:10px 0 6px;font-size:16px}
  .card p{font-size:14px;color:var(--muted);margin:0}

  .compare{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}
  .compare .bad,.compare .good{border-radius:12px;padding:14px;border:1px solid}
  .compare .bad{border-color:rgba(248,81,73,.4);background:rgba(248,81,73,.06)}
  .compare .good{border-color:rgba(63,185,80,.4);background:rgba(63,185,80,.06)}
  .compare h5{margin-bottom:8px;font-size:13px}
  .compare .bad h5{color:var(--red)}.compare .good h5{color:var(--green)}

  table{width:100%;border-collapse:collapse;margin:16px 0;font-size:14px}
  th,td{border:1px solid var(--line);padding:10px 12px;text-align:left}
  th{background:var(--bg3);font-weight:700}
  td code{color:var(--accent)}

  .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:15}

  @media(max-width:880px){
    .sidebar{position:fixed;left:0;top:0;z-index:30;transform:translateX(-100%);transition:.25s}
    .sidebar.open{transform:none}
    .topbar{display:flex}
    .scrim.show{display:block}
    .compare{grid-template-columns:1fr}
    h1{font-size:30px}
    .content{padding:28px 18px 100px}
  }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="brand">
    <div class="logo"><span class="badge">JS</span><span id="brandTitle">JavaScript с нуля</span></div>
    <p id="brandSub">Полный интерактивный курс. Пиши код прямо в браузере.</p>
    <div class="lang">
      <button data-lang="ru" class="active">🇷🇺 Русский</button>
      <button data-lang="uz">🇺🇿 O‘zbek</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
      <div class="progress-text" id="progText"></div>
    </div>
  </div>
  <nav class="nav" id="nav"></nav>
</aside>
<div class="scrim" id="scrim"></div>

<div class="main">
  <div class="topbar">
    <button class="menu-btn" id="menuBtn">☰</button>
    <strong id="topTitle">JavaScript</strong>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
const K=`<span class="tok-key">`, S=`<span class="tok-str">`, N=`<span class="tok-num">`,
      C=`<span class="tok-com">`, F=`<span class="tok-fn">`, _=`</span>`;

function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function escapeAttr(s){return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* Подписи интерфейса по языкам */
const UI = {
  ru:{ brand:"JavaScript с нуля", sub:"Полный интерактивный курс. Пиши код прямо в браузере.",
       run:"▶ Запустить", reset:"Сброс", play:"Песочница — нажми «Запустить»",
       consoleLbl:"Консоль", empty:"Здесь появится результат…",
       runOk:"Код выполнен. (Нет вывода — добавь console.log, чтобы что-то увидеть)",
       err:"❌ Ошибка: ", check:"Проверить ответы", prog:(n,t)=>`Пройдено ${n} из ${t}`,
       back:"← Назад", next:"Далее →", finish:"Курс пройден 🎉",
       perfect:(c,a)=>`🎉 Отлично! ${c} из ${a} верно!`,
       partial:(c,a)=>`Правильно ${c} из ${a}. Зелёным отмечены верные ответы — попробуй ещё!` },
  uz:{ brand:"JavaScript noldan", sub:"To‘liq interaktiv kurs. Kodni to‘g‘ridan-to‘g‘ri brauzerda yoz.",
       run:"▶ Ishga tushir", reset:"Tozalash", play:"Sinov maydoni — «Ishga tushir» bos",
       consoleLbl:"Konsol", empty:"Natija shu yerda chiqadi…",
       runOk:"Kod bajarildi. (Natija yo‘q — biror narsa ko‘rish uchun console.log qo‘sh)",
       err:"❌ Xato: ", check:"Javoblarni tekshir", prog:(n,t)=>`${t} dan ${n} tasi o‘tildi`,
       back:"← Orqaga", next:"Keyingi →", finish:"Kurs tugadi 🎉",
       perfect:(c,a)=>`🎉 Zo‘r! ${a} dan ${c} tasi to‘g‘ri!`,
       partial:(c,a)=>`${a} dan ${c} tasi to‘g‘ri. Yashil rang to‘g‘ri javob — yana urinib ko‘r!` }
};

let lang = localStorage.getItem('jsCourseLang') || 'ru';

function play(code){
  const t = UI[lang];
  return `<div class="play">
    <div class="play-head">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="title">${t.play}</span>
      <button class="reset" data-reset>${t.reset}</button>
      <button class="run" data-run>${t.run}</button>
    </div>
    <textarea class="editor" spellcheck="false" data-init="${escapeAttr(code)}">${escapeHtml(code)}</textarea>
    <div class="console"><div class="clabel">${t.consoleLbl}</div><div class="cout"><span class="empty">${t.empty}</span></div></div>
  </div>`;
}

/* ============================================================
   УРОКИ — двуязычные. title/group/html имеют {ru, uz}.
   html — функция, чтобы плейграунды строились на текущем языке.
   ============================================================ */
const LESSONS = [

/* ---------- 1. ВВЕДЕНИЕ ---------- */
{
id:"intro",
group:{ru:"Начало",uz:"Boshlash"},
title:{ru:"Что такое JavaScript",uz:"JavaScript nima"},
html:{
ru:()=>`
<div class="kicker">Урок 1</div>
<h1>Что такое JavaScript?</h1>
<p class="lead">JavaScript (или просто <b>JS</b>) — это язык программирования, который <b>оживляет</b> сайты. Без него страницы были бы просто картинками с текстом.</p>
<h2>Три кита веб-сайта</h2>
<p>Любой сайт держится на трёх технологиях. Представь, что строишь человека:</p>
<div class="grid">
  <div class="card"><div class="ico">🦴</div><h4>HTML</h4><p>Скелет. Структура страницы: заголовки, кнопки, картинки.</p></div>
  <div class="card"><div class="ico">👕</div><h4>CSS</h4><p>Одежда и внешность. Цвета, шрифты, расположение.</p></div>
  <div class="card"><div class="ico">🧠</div><h4>JavaScript</h4><p>Мозг и движения. Реакция на клики, вычисления, изменения на лету.</p></div>
</div>
<h2>Что умеет JavaScript?</h2>
<ul>
  <li>Реагировать на действия пользователя (клик, ввод текста, наведение мыши)</li>
  <li>Менять содержимое страницы без перезагрузки</li>
  <li>Делать вычисления (калькуляторы, корзины товаров)</li>
  <li>Показывать всплывающие окна, анимации, слайдеры</li>
  <li>Загружать данные с сервера (новости, погода, сообщения)</li>
</ul>
<div class="note"><b>💡 Важно</b>JavaScript работает прямо в браузере (Chrome, Firefox, Edge). Ничего устанавливать не нужно — браузер уже умеет его выполнять.</div>
<h2>Твой первый код</h2>
<p>Команда <code class="inline">console.log()</code> выводит сообщение в «консоль». Нажми <b>▶ Запустить</b>:</p>
${play(`console.log("Привет, мир!");\nconsole.log("Я учу JavaScript 🚀");`)}
<p>Поздравляю — ты выполнил настоящую программу! Поменяй текст в кавычках и запусти снова.</p>
<div class="quiz" data-quiz>
  <h3>✅ Мини-тест</h3>
  <div class="q" data-q data-answer="2"><div class="qtext">1. За что отвечает JavaScript на сайте?</div>
    <label class="opt"><input type="radio" name="q1"> За цвета и шрифты</label>
    <label class="opt"><input type="radio" name="q1"> За структуру страницы</label>
    <label class="opt"><input type="radio" name="q1"> За поведение и интерактивность («мозг»)</label></div>
  <div class="q" data-q data-answer="1"><div class="qtext">2. Что делает <code class="inline">console.log()</code>?</div>
    <label class="opt"><input type="radio" name="q2"> Удаляет сайт</label>
    <label class="opt"><input type="radio" name="q2"> Выводит сообщение в консоль</label>
    <label class="opt"><input type="radio" name="q2"> Меняет цвет фона</label></div>
  <button class="quiz-btn" data-check>Проверить ответы</button>
  <div class="quiz-result" data-result></div>
</div>`,
uz:()=>`
<div class="kicker">1-dars</div>
<h1>JavaScript nima?</h1>
<p class="lead">JavaScript (qisqacha <b>JS</b>) — saytlarni <b>jonlantiradigan</b> dasturlash tili. Usiz sahifalar shunchaki matnli rasmlar bo‘lib qolardi.</p>
<h2>Veb-saytning uchta asosi</h2>
<p>Har qanday sayt uchta texnologiyaga tayanadi. Xuddi odam yaratayotgandek tasavvur qil:</p>
<div class="grid">
  <div class="card"><div class="ico">🦴</div><h4>HTML</h4><p>Skelet. Sahifa tuzilishi: sarlavhalar, tugmalar, rasmlar.</p></div>
  <div class="card"><div class="ico">👕</div><h4>CSS</h4><p>Kiyim va tashqi ko‘rinish. Ranglar, shriftlar, joylashuv.</p></div>
  <div class="card"><div class="ico">🧠</div><h4>JavaScript</h4><p>Miya va harakat. Bosishga javob, hisob-kitob, jonli o‘zgarishlar.</p></div>

<h2>JavaScript nimalarni qila oladi?</h2>
<ul>
  <li>Foydalanuvchi harakatlariga javob beradi (bosish, matn kiritish, sichqoncha)</li>
  <li>Sahifa mazmunini qayta yuklamasdan o‘zgartiradi</li>
  <li>Hisob-kitob qiladi (kalkulyator, savatcha)</li>
  <li>Oynalar, animatsiyalar, slayderlar ko‘rsatadi</li>
  <li>Serverdan ma’lumot yuklaydi (yangiliklar, ob-havo, xabarlar)</li>
</ul>
<div class="note"><b>💡 Muhim</b>JavaScript to‘g‘ridan-to‘g‘ri brauzerda (Chrome, Firefox, Edge) ishlaydi. Hech narsa o‘rnatish shart emas.</div>
<h2>Sening birinchi koding</h2>
<p><code class="inline">console.log()</code> buyrug‘i «konsol»ga xabar chiqaradi. <b>▶ Ishga tushir</b> ni bos:</p>
${play(`console.log("Salom, dunyo!");\nconsole.log("Men JavaScript o‘rganyapman 🚀");`)}
<p>Tabriklayman — sen haqiqiy dastur ishga tushirding! Qo‘shtirnoq ichidagi matnni o‘zgartirib qaytadan bos.</p>
<div class="quiz" data-quiz>
  <h3>✅ Mini-test</h3>
  <div class="q" data-q data-answer="2"><div class="qtext">1. Saytda JavaScript nimaga javob beradi?</div>
    <label class="opt"><input type="radio" name="q1"> Rang va shriftlarga</label>
    <label class="opt"><input type="radio" name="q1"> Sahifa tuzilishiga</label>
    <label class="opt"><input type="radio" name="q1"> Xulq va interaktivlikka («miya»)</label></div>
  <div class="q" data-q data-answer="1"><div class="qtext">2. <code class="inline">console.log()</code> nima qiladi?</div>
    <label class="opt"><input type="radio" name="q2"> Saytni o‘chiradi</label>
    <label class="opt"><input type="radio" name="q2"> Konsolga xabar chiqaradi</label>
    <label class="opt"><input type="radio" name="q2"> Fon rangini o‘zgartiradi</label></div>
  <button class="quiz-btn" data-check>Javoblarni tekshir</button>
  <div class="quiz-result" data-result></div>
</div>`
}
},

/* ---------- 2. ПОДКЛЮЧЕНИЕ ---------- */
{
id:"setup",
group:{ru:"Начало",uz:"Boshlash"},
title:{ru:"Как запустить JS",uz:"JS ni qanday ishga tushirish"},
html:{
ru:()=>`
<div class="kicker">Урок 2</div>
<h1>Как подключить и запустить JavaScript</h1>
<p class="lead">Есть 3 способа выполнить JavaScript.</p>
<h2>Способ 1 — Консоль браузера</h2>
<ol><li>Открой любой сайт в Chrome</li><li>Нажми <code class="inline">F12</code></li><li>Вкладка <b>Console</b></li><li>Напиши код и нажми Enter</li></ol>
<div class="tip"><b>Попробуй</b>Открой консоль (F12) и набери <code class="inline">2 + 2</code> — браузер ответит <b>4</b>.</div>
<h2>Способ 2 — Тег &lt;script&gt; в HTML</h2>
<pre>${K}&lt;!DOCTYPE html&gt;${_}
&lt;body&gt;
  &lt;h1&gt;Мой сайт&lt;/h1&gt;
  &lt;script&gt;
    ${F}alert${_}(${S}"Привет с моего сайта!"${_});
  &lt;/script&gt;

<div class="kicker">Урок 6</div>
<h1>Условия — if / else</h1>
<p class="lead">Условие — это способ научить программу <b>принимать решения</b>. Как человек утром: «<b>если</b> идёт дождь — <b>то</b> беру зонт, <b>иначе</b> — не беру».</p>

<h2>Зачем это вообще нужно?</h2>
<p>До этого урока наш код выполнялся всегда одинаково — сверху вниз, строчка за строчкой, без вариантов. Но настоящие программы должны вести себя <b>по-разному</b> в разных ситуациях:</p>
<ul>
  <li>Ввёл <b>правильный</b> пароль → пускаем в аккаунт. <b>Неправильный</b> → показываем ошибку.</li>
  <li>Товара нет на складе → кнопка «Купить» становится серой.</li>
  <li>Возраст 18+ → показываем контент, иначе → «доступ запрещён».</li>
</ul>
<p>За все эти «развилки» отвечает конструкция <code class="inline">if</code> (с англ. «<b>если</b>»).</p>

<h2>Как устроен <code class="inline">if</code> — разбираем по кусочкам</h2>
<pre>${K}if${_} (age >= ${N}18${_}) {
  ${F}console${_}.log(${S}"Проходи"${_});
}</pre>
<p>Читаем медленно, каждую часть отдельно:</p>
<table>
  <tr><th>Часть</th><th>Как называется</th><th>Что делает</th></tr>
  <tr><td><code>if</code></td><td>ключевое слово</td><td>говорит «сейчас будет проверка»</td></tr>
  <tr><td><code>( age >= 18 )</code></td><td><b>условие</b> (в круглых скобках)</td><td>вопрос, на который есть ответ ДА или НЕТ</td></tr>
  <tr><td><code>{ ... }</code></td><td><b>тело</b> (в фигурных скобках)</td><td>код внутри сработает <b>только если</b> ответ ДА</td></tr>
</table>

<h2>Самое важное: что такое «условие»</h2>
<p>Условие — это выражение, которое всегда превращается в одно из двух значений: <code class="inline">true</code> (правда, ДА) или <code class="inline">false</code> (ложь, НЕТ). Помнишь операторы сравнения из прошлого урока? Именно они дают true / false. Запусти и посмотри:</p>
${play(`console.log(18 >= 18);  // true  → ДА\nconsole.log(15 >= 18);  // false → НЕТ\nconsole.log(10 === 10); // true\nconsole.log(5 > 100);   // false`)}
<div class="note"><b>💡 Золотое правило if</b>Компьютер вычисляет условие в скобках. Получилось <code class="inline">true</code> → заходит в фигурные скобки и выполняет код. Получилось <code class="inline">false</code> → <b>полностью пропускает</b> эти скобки и идёт дальше.</div>

<h2>Шаг 1 — только <code class="inline">if</code> (без else)</h2>
<p>Самый простой случай: сделать что-то <b>только</b> если условие верно. Если нет — просто ничего не происходит.</p>
${play(`let temperature = 35;\n\nif (temperature > 30) {\n  console.log("Жарко! Включаю кондиционер ❄️");\n}\n\nconsole.log("Программа работает дальше...");`)}
<p><b>Эксперимент:</b> поменяй <code class="inline">temperature</code> на <code class="inline">20</code> и запусти. Первая строчка <b>не</b> появится — условие стало <code class="inline">false</code>, и компьютер пропустил фигурные скобки. А вот «Программа работает дальше» появится в любом случае, потому что она вне <code class="inline">if</code>.</p>

<h2>Шаг 2 — <code class="inline">if</code> + <code class="inline">else</code> («иначе»)</h2>
<p><code class="inline">else</code> — это запасной вариант. Он срабатывает, когда условие в <code class="inline">if</code> оказалось <code class="inline">false</code>. Из двух блоков выполнится <b>ровно один</b> — всегда.</p>
${play(`let age = 20;\n\nif (age >= 18) {\n  console.log("Проходи ✅");\n} else {\n  console.log("Тебе ещё рано ❌");\n}`)}
<h3>🔍 Как компьютер читает этот код, по шагам:</h3>
<ol>
  <li>Создаёт переменную <code class="inline">age</code> со значением <code class="inline">20</code>.</li>
  <li>Доходит до <code class="inline">if</code> и считает условие: <code class="inline">20 >= 18</code> → это <code class="inline">true</code>.</li>
  <li>Условие ДА → выполняет <b>первый</b> блок: печатает «Проходи ✅».</li>
  <li>Блок <code class="inline">else</code> при этом полностью <b>пропускается</b>.</li>
</ol>
<p><b>Эксперимент:</b> поставь <code class="inline">age = 15</code>. Теперь <code class="inline">15 >= 18</code> → <code class="inline">false</code>, и выполнится блок <code class="inline">else</code>: «Тебе ещё рано ❌».</p>

<h2>Шаг 3 — много вариантов через <code class="inline">else if</code></h2>
<p>Когда вариантов больше двух, добавляют <code class="inline">else if</code> («а если…»). Компьютер проверяет условия <b>сверху вниз</b> и останавливается на <b>первом</b>, которое оказалось <code class="inline">true</code>. Остальные даже не смотрит.</p>
${play(`let score = 75;\n\nif (score >= 90) {\n  console.log("Отлично! Оценка 5");\n} else if (score >= 70) {\n  console.log("Хорошо! Оценка 4");\n} else if (score >= 50) {\n  console.log("Нормально, оценка 3");\n} else {\n  console.log("Нужно подучить, оценка 2");\n}`)}
<h3>🔍 Разбор для <code class="inline">score = 75</code>:</h3>
<table>
  <tr><th>Проверка</th><th>Результат</th><th>Что делает компьютер</th></tr>
  <tr><td><code>75 >= 90</code></td><td>false</td><td>пропускает, идёт дальше</td></tr>
  <tr><td><code>75 >= 70</code></td><td>true ✅</td><td>печатает «Оценка 4» и <b>выходит</b></td></tr>
  <tr><td><code>75 >= 50</code></td><td>—</td><td>уже не проверяется</td></tr>
  <tr><td><code>else</code></td><td>—</td><td>уже не проверяется</td></tr>
</table>
<div class="tip"><b>Важный момент</b>Порядок условий имеет значение! Всегда пиши от самого строгого к самому мягкому (сначала <code class="inline">>= 90</code>, потом <code class="inline">>= 70</code> и т.д.).</p></div>

<h2>Несколько условий сразу: «И» / «ИЛИ»</h2>
<p>Иногда для решения нужно проверить <b>сразу два</b> условия. Тут помогают <code class="inline">&&</code> (И — нужны оба) и <code class="inline">||</code> (ИЛИ — хватит одного):</p>
${play(`let age = 25;\nlet hasTicket = true;\n\nif (age >= 18 && hasTicket) {\n  console.log("Пропускаем на фильм 18+ 🎬");\n} else {\n  console.log("Вход запрещён");\n}`)}
<p>Здесь пропустят, только если <b>и</b> возраст 18+, <b>и</b> есть билет. Убери билет (<code class="inline">hasTicket = false</code>) — и уже не пустят.</p>

<h2>⚠ Три ошибки, на которых спотыкаются все новички</h2>
<div class="compare">
  <div class="bad"><h5>✗ Один = вместо сравнения</h5><pre>${K}if${_} (age = ${N}18${_}) { }</pre><p style="font-size:13px;color:var(--muted);margin:6px 0 0">Один <code class="inline">=</code> это «присвоить». Условие сломается.</p></div>
  <div class="good"><h5>✓ Три = для сравнения</h5><pre>${K}if${_} (age === ${N}18${_}) { }</pre><p style="font-size:13px;color:var(--muted);margin:6px 0 0">Три <code class="inline">===</code> это «сравнить». Правильно.</p></div>
</div>
<div class="compare">
  <div class="bad"><h5>✗ Точка с запятой после if</h5><pre>${K}if${_} (x > ${N}5${_}); { }</pre><p style="font-size:13px;color:var(--muted);margin:6px 0 0">Из-за <code class="inline">;</code> блок оторвётся от условия.</p></div>
  <div class="good"><h5>✓ Без ; перед скобкой</h5><pre>${K}if${_} (x > ${N}5${_}) { }</pre></div>
</div>

<h2>Короткая запись — тернарный оператор</h2>
<p>Когда нужно просто выбрать одно из двух значений, есть сокращённая форма. Читается как вопрос: <code class="inline">условие ? значение_если_да : значение_если_нет</code></p>
${play(`let age = 16;\n\nlet status = age >= 18 ? "взрослый" : "ребёнок";\nconsole.log("Ты — " + status);`)}
<p>Это ровно то же самое, что <code class="inline">if/else</code>, но в одну строчку. Удобно для простых случаев.</p>

<h2>🎯 Попробуй сам</h2>
<p>Ниже — проверка пароля. Поменяй значение <code class="inline">password</code> и посмотри, как меняется результат. <code class="inline">.length</code> — это длина строки (сколько символов).</p>

<div class="kicker">6-dars</div>
<h1>Shartlar — if / else</h1>
<p class="lead">Shart — bu dasturni <b>qaror qabul qilishga</b> o‘rgatish usuli. Xuddi odam ertalab: «<b>agar</b> yomg‘ir yog‘sa — <b>u holda</b> soyabon olaman, <b>aks holda</b> — olmayman».</p>

<h2>Bu nima uchun kerak?</h2>
<p>Shu darsgacha kodimiz doim bir xil bajarildi — yuqoridan pastga, qatorma-qator. Lekin haqiqiy dasturlar turli holatlarda <b>turlicha</b> ishlashi kerak:</p>
<ul>
  <li><b>To‘g‘ri</b> parol kiritildi → akkauntga kiritamiz. <b>Noto‘g‘ri</b> → xato ko‘rsatamiz.</li>
  <li>Mahsulot omborda yo‘q → «Sotib olish» tugmasi kulrang bo‘ladi.</li>
  <li>Yosh 18+ → kontentni ko‘rsatamiz, aks holda → «ruxsat yo‘q».</li>
</ul>
<p>Bu «ayrilishlar»ga <code class="inline">if</code> («<b>agar</b>») javob beradi.</p>

<h2><code class="inline">if</code> qanday tuzilgan — qismlarga ajratamiz</h2>
<pre>${K}if${_} (age >= ${N}18${_}) {
  ${F}console${_}.log(${S}"O‘t"${_});
}</pre>
<table>

  <tr><td><code>( age >= 18 )</code></td><td><b>shart</b> (qavs ichida)</td><td>HA yoki YO‘Q javobli savol</td></tr>
  <tr><td><code>{ ... }</code></td><td><b>tana</b> (jingalak qavsda)</td><td>ichidagi kod <b>faqat</b> javob HA bo‘lsa ishlaydi</td></tr>
</table>

<h2>Eng muhimi: «shart» nima</h2>
<p>Shart — bu har doim ikkita qiymatdan biriga aylanadigan ifoda: <code class="inline">true</code> (rost, HA) yoki <code class="inline">false</code> (yolg‘on, YO‘Q). Taqqoslash operatorlari aynan true / false beradi. Ishga tushir:</p>
${play(`console.log(18 >= 18);  // true  → HA\nconsole.log(15 >= 18);  // false → YO‘Q\nconsole.log(10 === 10); // true\nconsole.log(5 > 100);   // false`)}
<div class="note"><b>💡 if oltin qoidasi</b>Kompyuter qavsdagi shartni hisoblaydi. <code class="inline">true</code> chiqsa → jingalak qavsga kirib kodni bajaradi. <code class="inline">false</code> chiqsa → bu qavslarni <b>butunlay tashlab</b> o‘tadi.</div>

<h2>1-qadam — faqat <code class="inline">if</code> (else siz)</h2>
<p>Eng oddiy holat: biror ishni <b>faqat</b> shart rost bo‘lsa qilish. Aks holda hech narsa bo‘lmaydi.</p>
${play(`let temperature = 35;\n\nif (temperature > 30) {\n  console.log("Issiq! Konditsioner yoqaman ❄️");\n}\n\nconsole.log("Dastur davom etyapti...");`)}

<h2>2-qadam — <code class="inline">if</code> + <code class="inline">else</code> («aks holda»)</h2>
<p><code class="inline">else</code> — zaxira variant. U <code class="inline">if</code> dagi shart <code class="inline">false</code> bo‘lganda ishlaydi. Ikki blokdan <b>aniq bittasi</b> doim bajariladi.</p>
${play(`let age = 20;\n\nif (age >= 18) {\n  console.log("O‘t ✅");\n} else {\n  console.log("Hali erta ❌");\n}`)}
<h3>🔍 Kompyuter bu kodni qanday o‘qiydi:</h3>
<ol>
  <li><code class="inline">age</code> o‘zgaruvchisini <code class="inline">20</code> qiymat bilan yaratadi.</li>
  <li><code class="inline">if</code> ga yetadi va shartni hisoblaydi: <code class="inline">20 >= 18</code> → <code class="inline">true</code>.</li>
  <li>Shart HA → <b>birinchi</b> blokni bajaradi: «O‘t ✅».</li>
  <li><code class="inline">else</code> bloki butunlay <b>tashlab o‘tiladi</b>.</li>
</ol>
<p><b>Tajriba:</b> <code class="inline">age = 15</code> qo‘y. Endi <code class="inline">15 >= 18</code> → <code class="inline">false</code>, va <code class="inline">else</code> bajariladi: «Hali erta ❌».</p>

<h2>3-qadam — ko‘p variant: <code class="inline">else if</code></h2>
<p>Variant ikkitadan ko‘p bo‘lsa, <code class="inline">else if</code> («agar esa…») qo‘shiladi. Kompyuter shartlarni <b>yuqoridan pastga</b> tekshiradi va <b>birinchi</b> <code class="inline">true</code> da to‘xtaydi. Qolganlariga qaramaydi.</p>

<table>

</table>

<p><code class="inline">&&</code> (VA — ikkalasi kerak) va <code class="inline">||</code> (YOKI — bittasi yetadi):</p>

</div>

html:{
ru:()=>`
<div class="kicker">Урок 7</div>
<h1>Циклы — повторяем действия</h1>
<p class="lead">Цикл — это способ повторить один и тот же код много раз, <b>не копируя его</b>. Как на тренировке: «отжаться 10 раз» — ты не пишешь 10 разных команд, ты повторяешь одно действие 10 раз.</p>

<h2>Проблема, которую решает цикл</h2>
<p>Представь, что нужно поздороваться 5 раз. Без цикла пришлось бы писать так:</p>
<pre>${F}console${_}.log(${S}"Привет 1"${_});
${F}console${_}.log(${S}"Привет 2"${_});
${F}console${_}.log(${S}"Привет 3"${_});
${F}console${_}.log(${S}"Привет 4"${_});
${F}console${_}.log(${S}"Привет 5"${_});  ${C}// а если нужно 1000 раз?!${_}</pre>
<p>Это долго и глупо. Цикл делает то же самое в 3 строчки — и хоть 1000 раз.</p>

<h2>Цикл <code class="inline">for</code> — разбираем по частям</h2>
<p>У цикла <code class="inline">for</code> в круглых скобках <b>три части</b>, разделённые точкой с запятой <code class="inline">;</code>. Это как настройки для повторения:</p>
<pre>${K}for${_} (${K}let${_} i = ${N}1${_};  i &lt;= ${N}5${_};  i++) {
  ${C}// этот код повторится${_}
}</pre>
<table>
  <tr><th>Часть</th><th>Название</th><th>Что делает</th></tr>
  <tr><td><code>let i = 1</code></td><td>старт</td><td>создаём счётчик <code class="inline">i</code>, начинаем с 1. Выполняется <b>один раз</b> в самом начале</td></tr>
  <tr><td><code>i &lt;= 5</code></td><td>условие</td><td>проверяется <b>перед каждым</b> повтором. Пока <code class="inline">true</code> — цикл работает. Стал <code class="inline">false</code> — стоп</td></tr>
  <tr><td><code>i++</code></td><td>шаг</td><td>после каждого повтора увеличивает <code class="inline">i</code> на 1</td></tr>
</table>
<div class="note"><b>💡 Что такое <code class="inline">i</code>?</b>Это обычная переменная-счётчик (от англ. index). Она хранит номер текущего повтора. Имя <code class="inline">i</code> — просто традиция, можно назвать как угодно.</div>

<h2>Смотрим цикл в действии</h2>
${play(`for (let i = 1; i <= 5; i++) {\n  console.log("Повтор номер " + i);\n}`)}
<h3>🔍 Таблица прогона — как компьютер крутит этот цикл:</h3>
<table>
  <tr><th>Шаг</th><th>Чему равно <code>i</code></th><th>Проверка <code>i &lt;= 5</code></th><th>Что печатает</th><th>Потом <code>i++</code></th></tr>
  <tr><td>1</td><td>1</td><td>1 &lt;= 5 → true ✅</td><td>Повтор номер 1</td><td>i станет 2</td></tr>
  <tr><td>2</td><td>2</td><td>2 &lt;= 5 → true ✅</td><td>Повтор номер 2</td><td>i станет 3</td></tr>
  <tr><td>3</td><td>3</td><td>3 &lt;= 5 → true ✅</td><td>Повтор номер 3</td><td>i станет 4</td></tr>
  <tr><td>4</td><td>4</td><td>4 &lt;= 5 → true ✅</td><td>Повтор номер 4</td><td>i станет 5</td></tr>
  <tr><td>5</td><td>5</td><td>5 &lt;= 5 → true ✅</td><td>Повтор номер 5</td><td>i станет 6</td></tr>
  <tr><td>6</td><td>6</td><td>6 &lt;= 5 → <b>false</b> ❌</td><td>цикл <b>останавливается</b></td><td>—</td></tr>
</table>
<p>Видишь? Как только условие стало <code class="inline">false</code>, цикл заканчивается. Поэтому повторов ровно 5.</p>

<h2>Меняем настройки цикла</h2>
<p>Три части можно менять как хочешь. Попробуй разные варианты — запусти и посмотри:</p>
${play(`// Считаем от 0 до 4 (пять раз, но с нуля)\nfor (let i = 0; i < 5; i++) {\n  console.log("i =", i);\n}`)}
${play(`// Обратный отсчёт: от 5 до 1\nfor (let i = 5; i >= 1; i--) {\n  console.log(i);\n}\nconsole.log("Поехали! 🚀");`)}
<p>Здесь <code class="inline">i--</code> — уменьшает счётчик на 1 (наоборот к <code class="inline">i++</code>).</p>

<h2>Зачем циклы на практике — копим сумму</h2>
<p>Очень частая задача: сложить числа от 1 до 10. Заводим переменную <code class="inline">sum</code> и на каждом шаге добавляем к ней <code class="inline">i</code>:</p>
${play(`let sum = 0;\n\nfor (let i = 1; i <= 10; i++) {\n  sum = sum + i;   // добавляем текущее число\n}\n\nconsole.log("Сумма от 1 до 10 =", sum); // 55`)}
<p><code class="inline">sum = sum + i</code> читается так: «новое значение sum = старое sum плюс i». Шаг за шагом: 0→1→3→6→10→15…→55.</p>

<h2>Таблица умножения — цикл экономит время</h2>
${play(`let n = 7;\n\nfor (let i = 1; i <= 9; i++) {\n  console.log(n + " x " + i + " = " + (n * i));\n}`)}
<p>Поменяй <code class="inline">n = 7</code> на любое число — получишь таблицу умножения для него.</p>

<h2>Цикл <code class="inline">while</code> — «пока»</h2>
<p><code class="inline">while</code> проще: он повторяет код, <b>пока</b> условие верно. Его берут, когда заранее <b>не знаешь</b>, сколько будет повторов.</p>
${play(`let fuel = 5;\n\nwhile (fuel > 0) {\n  console.log("Едем... топлива: " + fuel);\n  fuel--;   // тратим топливо\n}\n\nconsole.log("Топливо кончилось 🛑");`)}
<p>Здесь важно, чтобы внутри цикла что-то <b>меняло</b> условие (<code class="inline">fuel--</code>), иначе оно никогда не станет false.</p>

<div class="warn"><b>⚠ Бесконечный цикл — главная опасность</b>Если условие <b>никогда</b> не станет <code class="inline">false</code> (например, забыл <code class="inline">i++</code> или <code class="inline">fuel--</code>), цикл будет крутиться вечно и браузер зависнет. Всегда убеждайся, что счётчик двигается к завершению!</div>

<h2>🎯 Попробуй сам</h2>
<p>Выведи только чётные числа от 2 до 10. Подсказка уже в коде — просто запусти:</p>
${play(`for (let i = 2; i <= 10; i++) {\n  if (i % 2 === 0) {\n    console.log(i + " — чётное");\n  }\n}`)}
<p>Заметь: здесь <b>цикл и условие работают вместе</b> — цикл перебирает числа, а <code class="inline">if</code> отбирает нужные. Так строятся настоящие программы.</p>

</div>`,

/* ---------- 8. ФУНКЦИИ ---------- */
{
id:"functions",
group:{ru:"Логика",uz:"Mantiq"},
title:{ru:"Функции",uz:"Funksiyalar"},
html:{
ru:()=>`
<div class="kicker">Урок 8</div>
<h1>Функции — переиспользуем код</h1>
<p class="lead">Функция — это <b>своя команда, которую ты создаёшь сам</b>. Представь кофемашину: кладёшь зёрна (вход) → она варит (обработка) → выдаёт кофе (выход). Функция работает так же.</p>

<h2>Зачем нужны функции?</h2>
<p>Допустим, ты написал 5 строк кода, который считает скидку. Если такой расчёт нужен в 10 местах программы — без функции пришлось бы копировать эти 5 строк 10 раз. А если в расчёте ошибка — исправлять в 10 местах. С функцией ты пишешь код <b>один раз</b>, даёшь ему имя и потом просто вызываешь по имени.</p>
<p>Функция даёт три больших плюса:</p>
<ul>
  <li><b>Не повторяешься</b> — написал один раз, используешь много.</li>
  <li><b>Порядок</b> — код разбит на понятные кусочки с именами.</li>
  <li><b>Легко чинить</b> — ошибку правишь в одном месте.</li>
</ul>

<h2>Два действия: создать функцию и вызвать её</h2>
<p>С функцией всегда два шага. Не путай их:</p>
<ol>
  <li><b>Создание (объявление)</b> — ты описываешь, <i>что</i> функция умеет. Сам по себе этот код ничего не делает — он просто «лежит и ждёт».</li>
  <li><b>Вызов</b> — ты говоришь «выполни!». Только тогда код внутри срабатывает.</li>
</ol>

<h2>Создаём первую функцию — по частям</h2>
<pre>${K}function${_} ${F}greet${_}(name) {
  ${F}console${_}.log(${S}"Привет, "${_} + name);
}</pre>
<table>
  <tr><th>Часть</th><th>Что это</th></tr>
  <tr><td><code>function</code></td><td>ключевое слово: «я создаю функцию»</td></tr>
  <tr><td><code>greet</code></td><td>имя функции (придумываешь сам, глаголом)</td></tr>
  <tr><td><code>(name)</code></td><td><b>параметр</b> — то, что функция получает на вход</td></tr>
  <tr><td><code>{ ... }</code></td><td><b>тело</b> — что функция делает</td></tr>
</table>
<p>А вот <b>вызов</b> — с него и начинается работа:</p>
${play(`function greet(name) {\n  console.log("Привет, " + name + "!");\n}\n\n// вызываем функцию три раза с разными именами\ngreet("Самандар");\ngreet("Анвар");\ngreet("Малика");`)}
<p>Одна функция — три приветствия! Обрати внимание: строчки <code class="inline">greet("...")</code> и есть <b>вызовы</b>. Каждый раз внутрь через <code class="inline">name</code> попадает новое имя.</p>

<h2>Параметр и аргумент — в чём разница</h2>
<p>Эти два слова часто путают. На самом деле всё просто:</p>
<table>
  <tr><th>Термин</th><th>Где</th><th>Пример</th></tr>
  <tr><td><b>Параметр</b></td><td>при <b>создании</b> функции</td><td><code>function greet(name)</code> — <code>name</code> это параметр (пустая «ячейка»)</td></tr>
  <tr><td><b>Аргумент</b></td><td>при <b>вызове</b> функции</td><td><code>greet("Анвар")</code> — <code>"Анвар"</code> это аргумент (реальное значение)</td></tr>
</table>
<div class="note"><b>💡 Простыми словами</b><b>Параметр</b> — это пустая коробка с именем, которую функция ждёт. <b>Аргумент</b> — то, что ты реально кладёшь в эту коробку при вызове.</div>

<h2>Несколько параметров</h2>
<p>Функция может принимать сколько угодно значений — просто перечисли их через запятую:</p>
${play(`function greetFull(name, age) {\n  console.log("Меня зовут " + name + ", мне " + age + " лет");\n}\n\ngreetFull("Азиз", 20);\ngreetFull("Дилноза", 17);`)}
<p>Порядок важен: первый аргумент попадёт в первый параметр, второй — во второй.</p>

<h2>Функция, которая <b>возвращает</b> результат — <code class="inline">return</code></h2>
<p>До этого функции просто печатали текст. Но чаще функция должна <b>посчитать</b> что-то и <b>отдать</b> результат обратно, чтобы мы могли его сохранить и использовать дальше. Для этого есть <code class="inline">return</code> («вернуть»).</p>
${play(`function add(a, b) {\n  return a + b;   // возвращаем результат наружу\n}\n\nlet result = add(5, 3);   // ловим результат в переменную\nconsole.log("5 + 3 =", result);\nconsole.log("10 + 20 =", add(10, 20));`)}
<h3>🔍 Что здесь происходит:</h3>
<ol>
  <li>Вызываем <code class="inline">add(5, 3)</code>. Внутри: <code class="inline">a = 5</code>, <code class="inline">b = 3</code>.</li>
  <li><code class="inline">return 5 + 3</code> → функция «отдаёт» число <code class="inline">8</code> наружу.</li>
  <li>Это <code class="inline">8</code> попадает в переменную <code class="inline">result</code>.</li>
  <li>Печатаем <code class="inline">result</code> → 8.</li>
</ol>
<div class="warn"><b>⚠ Разница, которую важно понять</b><code class="inline">console.log</code> внутри функции просто <b>показывает</b> текст на экране. А <code class="inline">return</code> <b>отдаёт значение</b>, которое можно сохранить в переменную и посчитать дальше. Это разные вещи!</div>
<div class="tip"><b>Ещё про return</b>Как только компьютер доходит до <code class="inline">return</code>, функция <b>сразу заканчивается</b> — код после return уже не выполнится.</div>

<h2>Функции + условия вместе</h2>
<p>Настоящая сила — когда внутри функции есть логика. Вот функция, которая решает, пропускать человека или нет:</p>
${play(`function canEnter(age) {\n  if (age >= 18) {\n    return "Проходите ✅";\n  } else {\n    return "Вход 18+ ❌";\n  }\n}\n\nconsole.log(canEnter(25));\nconsole.log(canEnter(15));`)}

<h2>Современная короткая запись — стрелочные функции</h2>

${C}// то же самое стрелочной функцией${_}
${K}const${_} ${F}add${_} = (a, b) ${K}=>${_} a + b;</pre>

<p>Chegirmani hisoblaydigan 5 qatorli kod yozding deylik. Agar u 10 joyda kerak bo‘lsa — funksiyasiz bu 5 qatorni 10 marta nusxalash kerak. Xato bo‘lsa — 10 joyda tuzatasan. Funksiya bilan kodni <b>bir marta</b> yozasan, nom berasan va nom orqali chaqirasan.</p>

<h2>Ikki amal: funksiyani yaratish va chaqirish</h2>

<p>Ko‘pincha funksiya biror narsani <b>hisoblab</b>, natijani <b>qaytarishi</b> kerak — keyin uni saqlab, ishlatamiz. Buning uchun <code class="inline">return</code> bor.</p>

    }
    const a=document.createElement('a'); a.dataset.idx=i;
    a.innerHTML=`<span class="num">${i+1}</span><span>${les.title[lang]}</span>`;
    a.onclick=()=>{goTo(i);closeMenu();};
    nav.appendChild(a);
  });

  /* уроки */
  content.innerHTML='';
  LESSONS.forEach((les,i)=>{
    const d=document.createElement('div');
    d.className='lesson'; d.dataset.idx=i;
    d.innerHTML=les.html[lang]()+pagerHtml(i);
    content.appendChild(d);
  });

  goTo(current);
  updateProgress();
  bindLiveDemo();
}

function pagerHtml(i){
  const prev=LESSONS[i-1], next=LESSONS[i+1], tt=t();
  return `<div class="pager">
    <button ${prev?'':'disabled'} data-go="${i-1}"><div class="dir">${tt.back}</div><div class="ttl">${prev?prev.title[lang]:'—'}</div></button>
    <button class="next" ${next?'':'disabled'} data-go="${i+1}"><div class="dir">${tt.next}</div><div class="ttl">${next?next.title[lang]:tt.finish}</div></button>
  </div>`;
}

function goTo(i){
  if(i<0||i>=LESSONS.length) return;
  current=i;
  document.querySelectorAll('.lesson').forEach(l=>l.classList.toggle('active',+l.dataset.idx===i));
  document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('active',+a.dataset.idx===i));
  markDone(i);
  window.scrollTo({top:0,behavior:'smooth'});
}

function markDone(i){
  if(!done.includes(i)){done.push(i);localStorage.setItem('jsCourseDone',JSON.stringify(done));}
  updateProgress();
}
function updateProgress(){
  const total=LESSONS.length,n=done.length;
  progFill.style.width=(n/total*100)+'%';
  progText.textContent=t().prog(n,total);
  document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('done',done.includes(+a.dataset.idx)));
}

content.addEventListener('click',e=>{
  const go=e.target.closest('[data-go]'); if(go){goTo(+go.dataset.go);return;}
  const run=e.target.closest('[data-run]'); if(run){runPlay(run.closest('.play'));return;}
  const reset=e.target.closest('[data-reset]');
  if(reset){const ta=reset.closest('.play').querySelector('.editor');ta.value=ta.dataset.init;
    reset.closest('.play').querySelector('.cout').innerHTML=`<span class="empty">${t().empty}</span>`;return;}
  const check=e.target.closest('[data-check]'); if(check){checkQuiz(check.closest('[data-quiz]'));return;}
});

function runPlay(play){
  const code=play.querySelector('.editor').value;
  const out=play.querySelector('.cout');
  const logs=[];
  const fc={log:(...a)=>logs.push({t:'log',v:a}),error:(...a)=>logs.push({t:'err',v:a}),
            warn:(...a)=>logs.push({t:'log',v:a}),info:(...a)=>logs.push({t:'log',v:a})};
  try{ new Function('console',code)(fc); }
  catch(err){ logs.push({t:'err',v:[t().err+err.message]}); }
  if(logs.length===0){out.innerHTML=`<span class="empty">${t().runOk}</span>`;return;}
  out.innerHTML=logs.map(l=>`<div class="line ${l.t==='err'?'err':''}">${escapeHtml(l.v.map(fmt).join(' '))}</div>`).join('');
}
function fmt(v){
  if(typeof v==='string')return v;
  if(v===undefined)return 'undefined';
  if(v===null)return 'null';
  try{return JSON.stringify(v);}catch(e){return String(v);}
}

function checkQuiz(quiz){
  const qs=quiz.querySelectorAll('[data-q]'); let correct=0;
  qs.forEach(q=>{
    const ans=+q.dataset.answer, opts=q.querySelectorAll('.opt');
    opts.forEach(o=>o.classList.remove('correct','wrong'));
    let chosen=-1;
    q.querySelectorAll('input[type=radio]').forEach((r,idx)=>{if(r.checked)chosen=idx;});
    if(chosen===ans){correct++;opts[chosen].classList.add('correct');}
    else if(chosen>=0){opts[chosen].classList.add('wrong');opts[ans].classList.add('correct');}
    else{opts[ans].classList.add('correct');}
  });
  const res=quiz.querySelector('[data-result]'); res.style.display='block';
  const all=qs.length;
  if(correct===all){res.style.color='var(--green)';res.textContent=t().perfect(correct,all);}
  else{res.style.color='var(--accent)';res.textContent=t().partial(correct,all);}
}

const sidebar=document.getElementById('sidebar'), scrim=document.getElementById('scrim');
document.getElementById('menuBtn').onclick=()=>{sidebar.classList.add('open');scrim.classList.add('show');};
scrim.onclick=closeMenu;
function closeMenu(){sidebar.classList.remove('open');scrim.classList.remove('show');}

document.querySelectorAll('.lang button').forEach(b=>{
  b.onclick=()=>{ lang=b.dataset.lang; localStorage.setItem('jsCourseLang',lang); render(); };
});

function bindLiveDemo(){
  const el=document.querySelector('.lesson.active');
  if(!el) return;
  const tx=el.querySelector('#liveDemoText');
  const b1=el.querySelector('#demoBtn1'), b2=el.querySelector('#demoBtn2'), b3=el.querySelector('#demoBtn3');
  const cnt=el.querySelector('#demoCount');
  if(!tx||!b1) return;
  const greet=lang==='ru'
    ?["Привет! 👋","Salom! 🇺🇿","Hello! 🌍","Молодец! 🎓","JavaScript работает! ⚡"]
    :["Salom! 👋","Привет! 🇷🇺","Hello! 🌍","Barakalla! 🎓","JavaScript ishlayapti! ⚡"];
  let gi=0,clicks=0;
  b1.onclick=()=>{tx.textContent=greet[gi%greet.length];gi++;};
  const colors=["#f7df1e","#58a6ff","#3fb950","#f85149","#d2a8ff","#ff7b72"];
  b2.onclick=()=>{tx.style.color=colors[Math.floor(Math.random()*colors.length)];};
  b3.onclick=()=>{clicks++;cnt.textContent=clicks;};
}

/* старт: при переходе по урокам тоже навешиваем демо */
const _goTo=goTo;
goTo=function(i){_goTo(i);bindLiveDemo();};

render();
</script>
</body>
</html>
