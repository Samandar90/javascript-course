<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript с нуля / noldan — интерактивный курс</title>
<style>
  :root{
    --bg:#0d1117; --bg2:#161b22; --bg3:#1c2330;
    --line:#2b3340; --text:#e6edf3; --muted:#9aa7b4;
    --accent:#f7df1e; --accent2:#58a6ff; --green:#3fb950; --red:#f85149;
    --code:#0b0f14; --shadow:0 10px 40px rgba(0,0,0,.45);
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.7;
    display:flex; min-height:100vh;
  }
  a{color:var(--accent2);text-decoration:none}

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:300px; background:var(--bg2); border-right:1px solid var(--line);
    height:100vh; position:sticky; top:0; overflow-y:auto; flex-shrink:0;
    padding:0 0 40px;
  }
  .brand{
    padding:22px 22px 16px; position:sticky; top:0; background:var(--bg2);
    border-bottom:1px solid var(--line); z-index:5;
  }
  .brand .logo{display:flex;align-items:center;gap:12px;font-weight:800;font-size:18px}
  .brand .badge{background:var(--accent);color:#000;font-weight:900;border-radius:8px;
    width:38px;height:38px;display:grid;place-items:center;font-size:16px}
  .brand p{color:var(--muted);font-size:12.5px;margin-top:8px}

  .lang{display:flex;gap:6px;margin-top:14px;background:var(--bg3);padding:4px;border-radius:10px}
  .lang button{flex:1;background:transparent;border:none;color:var(--muted);padding:8px;
    border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;transition:.15s}
  .lang button.active{background:var(--accent);color:#000}

  .progress-wrap{margin-top:14px}
  .progress-bar{height:7px;background:var(--bg3);border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--accent));transition:width .4s}
  .progress-text{font-size:11.5px;color:var(--muted);margin-top:6px}

  .nav{padding:10px 12px}
  .nav-group{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:16px 12px 6px;font-weight:700}
  .nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;
    color:var(--text);font-size:14px;cursor:pointer;transition:.15s}
  .nav a:hover{background:var(--bg3)}
  .nav a.active{background:var(--accent);color:#000;font-weight:700}
  .nav a .num{font-size:12px;opacity:.7;width:22px}
  .nav a.done::after{content:"✓";margin-left:auto;color:var(--green);font-weight:900}
  .nav a.active.done::after{color:#000}

  /* ---------- MAIN ---------- */
  .main{flex:1;min-width:0}
  .topbar{display:none;align-items:center;gap:12px;padding:12px 16px;
    background:var(--bg2);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .menu-btn{background:var(--bg3);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:8px 12px;font-size:18px;cursor:pointer}
  .content{max-width:920px;margin:0 auto;padding:46px 28px 120px}

  .lesson{display:none;animation:fade .35s ease}
  .lesson.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .kicker{color:var(--accent);font-weight:700;font-size:13px;letter-spacing:.05em;text-transform:uppercase}
  h1{font-size:38px;line-height:1.2;margin:8px 0 18px;font-weight:800}
  h2{font-size:25px;margin:38px 0 14px;font-weight:800;border-left:4px solid var(--accent);padding-left:14px}
  h3{font-size:19px;margin:26px 0 10px;font-weight:700;color:#fff}
  p{margin:12px 0;color:#d2dae3}
  ul,ol{margin:12px 0 12px 24px}
  li{margin:7px 0;color:#d2dae3}
  strong{color:#fff}
  .lead{font-size:18px;color:var(--muted)}

  .note,.tip,.warn{border-radius:12px;padding:14px 18px;margin:18px 0;border-left:4px solid;background:var(--bg2)}
  .note{border-color:var(--accent2)}
  .tip{border-color:var(--green)}
  .warn{border-color:var(--red)}
  .note b,.tip b,.warn b{display:block;margin-bottom:4px}

  code.inline{background:var(--bg3);padding:2px 7px;border-radius:6px;font-family:"Consolas",monospace;font-size:14px;color:var(--accent)}

  pre{background:var(--code);border:1px solid var(--line);border-radius:12px;
    padding:16px 18px;overflow-x:auto;margin:16px 0;font-size:14.5px;
    font-family:"Consolas","Courier New",monospace;line-height:1.6}
  .tok-key{color:#ff7b72}.tok-str{color:#a5d6ff}.tok-num{color:#79c0ff}
  .tok-com{color:#8b949e;font-style:italic}.tok-fn{color:#d2a8ff}.tok-bool{color:#79c0ff}

  .play{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin:22px 0;box-shadow:var(--shadow)}
  .play-head{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--line);font-size:13px;color:var(--muted)}
  .dot{width:11px;height:11px;border-radius:50%}
  .dot.r{background:#ff5f56}.dot.y{background:#ffbd2e}.dot.g{background:#27c93f}
  .play-head .title{margin-left:8px;font-weight:600}
  .play-head .run{margin-left:auto;background:var(--green);color:#fff;border:none;
    padding:7px 16px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px}
  .play-head .run:hover{filter:brightness(1.1)}
  .play-head .reset{background:transparent;border:1px solid var(--line);color:var(--muted);
    padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px}
  .editor{width:100%;background:var(--code);color:#e6edf3;border:none;outline:none;
    font-family:"Consolas","Courier New",monospace;font-size:14.5px;line-height:1.6;
    padding:16px 18px;resize:vertical;min-height:120px;display:block;tab-size:2;white-space:pre}
  .console{background:#06090d;border-top:1px solid var(--line);padding:14px 18px;
    font-family:"Consolas",monospace;font-size:14px;min-height:48px;color:#c9d1d9}
  .console .clabel{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
  .console .line{white-space:pre-wrap;padding:2px 0;border-bottom:1px dashed #131a22}
  .console .err{color:var(--red)}
  .console .empty{color:#4d5b6a;font-style:italic}

  .quiz{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:22px;margin:24px 0}
  .quiz h3{margin-top:0}
  .q{margin:18px 0}
  .q .qtext{font-weight:600;margin-bottom:10px}
  .opt{display:block;padding:11px 14px;border:1px solid var(--line);border-radius:10px;
    margin:8px 0;cursor:pointer;transition:.15s;background:var(--bg3)}
  .opt:hover{border-color:var(--accent2)}
  .opt.correct{border-color:var(--green);background:rgba(63,185,80,.15)}
  .opt.wrong{border-color:var(--red);background:rgba(248,81,73,.12)}
  .opt input{margin-right:10px}
  .quiz-btn{background:var(--accent);color:#000;border:none;padding:11px 22px;border-radius:10px;
    font-weight:800;cursor:pointer;margin-top:8px;font-size:14px}
  .quiz-result{margin-top:14px;font-weight:700;display:none}

  .pager{display:flex;justify-content:space-between;gap:14px;margin-top:60px;border-top:1px solid var(--line);padding-top:26px}
  .pager button{flex:1;background:var(--bg2);border:1px solid var(--line);color:var(--text);
    padding:16px 20px;border-radius:14px;cursor:pointer;text-align:left;transition:.15s}
  .pager button:hover:not(:disabled){border-color:var(--accent);background:var(--bg3)}
  .pager button:disabled{opacity:.35;cursor:not-allowed}
  .pager .dir{font-size:12px;color:var(--muted)}
  .pager .ttl{font-weight:700;margin-top:3px}
  .pager .next{text-align:right}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin:18px 0}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:18px}
  .card .ico{font-size:26px}
  .card h4{margin:10px 0 6px;font-size:16px}
  .card p{font-size:14px;color:var(--muted);margin:0}

  .compare{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}
  .compare .bad,.compare .good{border-radius:12px;padding:14px;border:1px solid}
  .compare .bad{border-color:rgba(248,81,73,.4);background:rgba(248,81,73,.06)}
  .compare .good{border-color:rgba(63,185,80,.4);background:rgba(63,185,80,.06)}
  .compare h5{margin-bottom:8px;font-size:13px}
  .compare .bad h5{color:var(--red)}.compare .good h5{color:var(--green)}

  table{width:100%;border-collapse:collapse;margin:16px 0;font-size:14px}
  th,td{border:1px solid var(--line);padding:10px 12px;text-align:left}
  th{background:var(--bg3);font-weight:700}
  td code{color:var(--accent)}

  .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:15}

  @media(max-width:880px){
    .sidebar{position:fixed;left:0;top:0;z-index:30;transform:translateX(-100%);transition:.25s}
    .sidebar.open{transform:none}
    .topbar{display:flex}
    .scrim.show{display:block}
    .compare{grid-template-columns:1fr}
    h1{font-size:30px}
    .content{padding:28px 18px 100px}
  }
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="brand">
    <div class="logo"><span class="badge">JS</span><span id="brandTitle">JavaScript с нуля</span></div>
    <p id="brandSub">Полный интерактивный курс. Пиши код прямо в браузере.</p>
    <div class="lang">
      <button data-lang="ru" class="active">🇷🇺 Русский</button>
      <button data-lang="uz">🇺🇿 O‘zbek</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
      <div class="progress-text" id="progText"></div>
    </div>
  </div>
  <nav class="nav" id="nav"></nav>
</aside>
<div class="scrim" id="scrim"></div>

<div class="main">
  <div class="topbar">
    <button class="menu-btn" id="menuBtn">☰</button>
    <strong id="topTitle">JavaScript</strong>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
const K=`<span class="tok-key">`, S=`<span class="tok-str">`, N=`<span class="tok-num">`,
      C=`<span class="tok-com">`, F=`<span class="tok-fn">`, _=`</span>`;

function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function escapeAttr(s){return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* Подписи интерфейса по языкам */
const UI = {
  ru:{ brand:"JavaScript с нуля", sub:"Полный интерактивный курс. Пиши код прямо в браузере.",
       run:"▶ Запустить", reset:"Сброс", play:"Песочница — нажми «Запустить»",
       consoleLbl:"Консоль", empty:"Здесь появится результат…",
       runOk:"Код выполнен. (Нет вывода — добавь console.log, чтобы что-то увидеть)",
       err:"❌ Ошибка: ", check:"Проверить ответы", prog:(n,t)=>`Пройдено ${n} из ${t}`,
       back:"← Назад", next:"Далее →", finish:"Курс пройден 🎉",
       perfect:(c,a)=>`🎉 Отлично! ${c} из ${a} верно!`,
       partial:(c,a)=>`Правильно ${c} из ${a}. Зелёным отмечены верные ответы — попробуй ещё!` },
  uz:{ brand:"JavaScript noldan", sub:"To‘liq interaktiv kurs. Kodni to‘g‘ridan-to‘g‘ri brauzerda yoz.",
       run:"▶ Ishga tushir", reset:"Tozalash", play:"Sinov maydoni — «Ishga tushir» bos",
       consoleLbl:"Konsol", empty:"Natija shu yerda chiqadi…",
       runOk:"Kod bajarildi. (Natija yo‘q — biror narsa ko‘rish uchun console.log qo‘sh)",
       err:"❌ Xato: ", check:"Javoblarni tekshir", prog:(n,t)=>`${t} dan ${n} tasi o‘tildi`,
       back:"← Orqaga", next:"Keyingi →", finish:"Kurs tugadi 🎉",
       perfect:(c,a)=>`🎉 Zo‘r! ${a} dan ${c} tasi to‘g‘ri!`,
       partial:(c,a)=>`${a} dan ${c} tasi to‘g‘ri. Yashil rang to‘g‘ri javob — yana urinib ko‘r!` }
};

let lang = localStorage.getItem('jsCourseLang') || 'ru';

function play(code){
  const t = UI[lang];
  return `<div class="play">
    <div class="play-head">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="title">${t.play}</span>
      <button class="reset" data-reset>${t.reset}</button>
      <button class="run" data-run>${t.run}</button>
    </div>
    <textarea class="editor" spellcheck="false" data-init="${escapeAttr(code)}">${escapeHtml(code)}</textarea>
    <div class="console"><div class="clabel">${t.consoleLbl}</div><div class="cout"><span class="empty">${t.empty}</span></div></div>
  </div>`;
}

/* ============================================================
   УРОКИ — двуязычные. title/group/html имеют {ru, uz}.
   html — функция, чтобы плейграунды строились на текущем языке.
   ============================================================ */
const LESSONS = [

/* ---------- 1. ВВЕДЕНИЕ ---------- */
{
id:"intro",
group:{ru:"Начало",uz:"Boshlash"},
title:{ru:"Что такое JavaScript",uz:"JavaScript nima"},
html:{
ru:()=>`
<div class="kicker">Урок 1</div>
<h1>Что такое JavaScript?</h1>
<p class="lead">JavaScript (или просто <b>JS</b>) — это язык программирования, который <b>оживляет</b> сайты. Без него страницы были бы просто картинками с текстом.</p>
<h2>Три кита веб-сайта</h2>
<p>Любой сайт держится на трёх технологиях. Представь, что строишь человека:</p>
<div class="grid">
  <div class="card"><div class="ico">🦴</div><h4>HTML</h4><p>Скелет. Структура страницы: заголовки, кнопки, картинки.</p></div>
  <div class="card"><div class="ico">👕</div><h4>CSS</h4><p>Одежда и внешность. Цвета, шрифты, расположение.</p></div>
  <div class="card"><div class="ico">🧠</div><h4>JavaScript</h4><p>Мозг и движения. Реакция на клики, вычисления, изменения на лету.</p></div>
</div>
<h2>Что умеет JavaScript?</h2>
<ul>
  <li>Реагировать на действия пользователя (клик, ввод текста, наведение мыши)</li>
  <li>Менять содержимое страницы без перезагрузки</li>
  <li>Делать вычисления (калькуляторы, корзины товаров)</li>
  <li>Показывать всплывающие окна, анимации, слайдеры</li>
  <li>Загружать данные с сервера (новости, погода, сообщения)</li>
</ul>
<div class="note"><b>💡 Важно</b>JavaScript работает прямо в браузере (Chrome, Firefox, Edge). Ничего устанавливать не нужно — браузер уже умеет его выполнять.</div>
<h2>Твой первый код</h2>
<p>Команда <code class="inline">console.log()</code> выводит сообщение в «консоль». Нажми <b>▶ Запустить</b>:</p>
${play(`console.log("Привет, мир!");\nconsole.log("Я учу JavaScript 🚀");`)}
<p>Поздравляю — ты выполнил настоящую программу! Поменяй текст в кавычках и запусти снова.</p>
<div class="quiz" data-quiz>
  <h3>✅ Мини-тест</h3>
  <div class="q" data-q data-answer="2"><div class="qtext">1. За что отвечает JavaScript на сайте?</div>
    <label class="opt"><input type="radio" name="q1"> За цвета и шрифты</label>
    <label class="opt"><input type="radio" name="q1"> За структуру страницы</label>
    <label class="opt"><input type="radio" name="q1"> За поведение и интерактивность («мозг»)</label></div>
  <div class="q" data-q data-answer="1"><div class="qtext">2. Что делает <code class="inline">console.log()</code>?</div>
    <label class="opt"><input type="radio" name="q2"> Удаляет сайт</label>
    <label class="opt"><input type="radio" name="q2"> Выводит сообщение в консоль</label>
    <label class="opt"><input type="radio" name="q2"> Меняет цвет фона</label></div>
  <button class="quiz-btn" data-check>Проверить ответы</button>
  <div class="quiz-result" data-result></div>
</div>`,
uz:()=>`
<div class="kicker">1-dars</div>
<h1>JavaScript nima?</h1>
<p class="lead">JavaScript (qisqacha <b>JS</b>) — saytlarni <b>jonlantiradigan</b> dasturlash tili. Usiz sahifalar shunchaki matnli rasmlar bo‘lib qolardi.</p>
<h2>Veb-saytning uchta asosi</h2>
<p>Har qanday sayt uchta texnologiyaga tayanadi. Xuddi odam yaratayotgandek tasavvur qil:</p>
<div class="grid">
  <div class="card"><div class="ico">🦴</div><h4>HTML</h4><p>Skelet. Sahifa tuzilishi: sarlavhalar, tugmalar, rasmlar.</p></div>
  <div class="card"><div class="ico">👕</div><h4>CSS</h4><p>Kiyim va tashqi ko‘rinish. Ranglar, shriftlar, joylashuv.</p></div>
  <div class="card"><div class="ico">🧠</div><h4>JavaScript</h4><p>Miya va harakat. Bosishga javob, hisob-kitob, jonli o‘zgarishlar.</p></div>

<h2>JavaScript nimalarni qila oladi?</h2>
<ul>
  <li>Foydalanuvchi harakatlariga javob beradi (bosish, matn kiritish, sichqoncha)</li>
  <li>Sahifa mazmunini qayta yuklamasdan o‘zgartiradi</li>
  <li>Hisob-kitob qiladi (kalkulyator, savatcha)</li>
  <li>Oynalar, animatsiyalar, slayderlar ko‘rsatadi</li>
  <li>Serverdan ma’lumot yuklaydi (yangiliklar, ob-havo, xabarlar)</li>
</ul>
<div class="note"><b>💡 Muhim</b>JavaScript to‘g‘ridan-to‘g‘ri brauzerda (Chrome, Firefox, Edge) ishlaydi. Hech narsa o‘rnatish shart emas.</div>
<h2>Sening birinchi koding</h2>
<p><code class="inline">console.log()</code> buyrug‘i «konsol»ga xabar chiqaradi. <b>▶ Ishga tushir</b> ni bos:</p>
${play(`console.log("Salom, dunyo!");\nconsole.log("Men JavaScript o‘rganyapman 🚀");`)}
<p>Tabriklayman — sen haqiqiy dastur ishga tushirding! Qo‘shtirnoq ichidagi matnni o‘zgartirib qaytadan bos.</p>
<div class="quiz" data-quiz>
  <h3>✅ Mini-test</h3>
  <div class="q" data-q data-answer="2"><div class="qtext">1. Saytda JavaScript nimaga javob beradi?</div>
    <label class="opt"><input type="radio" name="q1"> Rang va shriftlarga</label>
    <label class="opt"><input type="radio" name="q1"> Sahifa tuzilishiga</label>
    <label class="opt"><input type="radio" name="q1"> Xulq va interaktivlikka («miya»)</label></div>
  <div class="q" data-q data-answer="1"><div class="qtext">2. <code class="inline">console.log()</code> nima qiladi?</div>
    <label class="opt"><input type="radio" name="q2"> Saytni o‘chiradi</label>
    <label class="opt"><input type="radio" name="q2"> Konsolga xabar chiqaradi</label>
    <label class="opt"><input type="radio" name="q2"> Fon rangini o‘zgartiradi</label></div>
  <button class="quiz-btn" data-check>Javoblarni tekshir</button>
  <div class="quiz-result" data-result></div>
</div>`
}
},

/* ---------- 2. ПОДКЛЮЧЕНИЕ ---------- */
{
id:"setup",
group:{ru:"Начало",uz:"Boshlash"},
title:{ru:"Как запустить JS",uz:"JS ni qanday ishga tushirish"},
html:{
ru:()=>`
<div class="kicker">Урок 2</div>
<h1>Как подключить и запустить JavaScript</h1>
<p class="lead">Есть 3 способа выполнить JavaScript.</p>
<h2>Способ 1 — Консоль браузера</h2>
<ol><li>Открой любой сайт в Chrome</li><li>Нажми <code class="inline">F12</code></li><li>Вкладка <b>Console</b></li><li>Напиши код и нажми Enter</li></ol>
<div class="tip"><b>Попробуй</b>Открой консоль (F12) и набери <code class="inline">2 + 2</code> — браузер ответит <b>4</b>.</div>
<h2>Способ 2 — Тег &lt;script&gt; в HTML</h2>
<pre>${K}&lt;!DOCTYPE html&gt;${_}
&lt;body&gt;
  &lt;h1&gt;Мой сайт&lt;/h1&gt;
  &lt;script&gt;
    ${F}alert${_}(${S}"Привет с моего сайта!"${_});
  &lt;/script&gt;

/* ============================================================
   ДВИЖОК
   ============================================================ */
const nav=document.getElementById('nav'), content=document.getElementById('content');
const progFill=document.getElementById('progFill'), progText=document.getElementById('progText');
let current=0;
let done=JSON.parse(localStorage.getItem('jsCourseDone')||'[]');

function t(){return UI[lang];}

function render(){
  document.documentElement.lang = lang;
  document.getElementById('brandTitle').textContent = t().brand;
  document.getElementById('brandSub').textContent = t().sub;
  document.getElementById('topTitle').textContent = lang==='ru'?'JavaScript с нуля':'JavaScript noldan';
  document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('active', b.dataset.lang===lang));

  /* меню */
  nav.innerHTML='';
  let lastGroup='';
  LESSONS.forEach((les,i)=>{
    if(les.group[lang]!==lastGroup){
      const g=document.createElement('div'); g.className='nav-group';
      g.textContent=les.group[lang]; nav.appendChild(g); lastGroup=les.group[lang];
    }
    const a=document.createElement('a'); a.dataset.idx=i;
    a.innerHTML=`<span class="num">${i+1}</span><span>${les.title[lang]}</span>`;
    a.onclick=()=>{goTo(i);closeMenu();};
    nav.appendChild(a);
  });

  /* уроки */
  content.innerHTML='';
  LESSONS.forEach((les,i)=>{
    const d=document.createElement('div');
    d.className='lesson'; d.dataset.idx=i;
    d.innerHTML=les.html[lang]()+pagerHtml(i);
    content.appendChild(d);
  });

  goTo(current);
  updateProgress();
  bindLiveDemo();
}

function pagerHtml(i){
  const prev=LESSONS[i-1], next=LESSONS[i+1], tt=t();
  return `<div class="pager">
    <button ${prev?'':'disabled'} data-go="${i-1}"><div class="dir">${tt.back}</div><div class="ttl">${prev?prev.title[lang]:'—'}</div></button>
    <button class="next" ${next?'':'disabled'} data-go="${i+1}"><div class="dir">${tt.next}</div><div class="ttl">${next?next.title[lang]:tt.finish}</div></button>
  </div>`;
}

function goTo(i){
  if(i<0||i>=LESSONS.length) return;
  current=i;
  document.querySelectorAll('.lesson').forEach(l=>l.classList.toggle('active',+l.dataset.idx===i));
  document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('active',+a.dataset.idx===i));
  markDone(i);
  window.scrollTo({top:0,behavior:'smooth'});
}

function markDone(i){
  if(!done.includes(i)){done.push(i);localStorage.setItem('jsCourseDone',JSON.stringify(done));}
  updateProgress();
}
function updateProgress(){
  const total=LESSONS.length,n=done.length;
  progFill.style.width=(n/total*100)+'%';
  progText.textContent=t().prog(n,total);
  document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('done',done.includes(+a.dataset.idx)));
}

content.addEventListener('click',e=>{
  const go=e.target.closest('[data-go]'); if(go){goTo(+go.dataset.go);return;}
  const run=e.target.closest('[data-run]'); if(run){runPlay(run.closest('.play'));return;}
  const reset=e.target.closest('[data-reset]');
  if(reset){const ta=reset.closest('.play').querySelector('.editor');ta.value=ta.dataset.init;
    reset.closest('.play').querySelector('.cout').innerHTML=`<span class="empty">${t().empty}</span>`;return;}
  const check=e.target.closest('[data-check]'); if(check){checkQuiz(check.closest('[data-quiz]'));return;}
});

function runPlay(play){
  const code=play.querySelector('.editor').value;
  const out=play.querySelector('.cout');
  const logs=[];
  const fc={log:(...a)=>logs.push({t:'log',v:a}),error:(...a)=>logs.push({t:'err',v:a}),
            warn:(...a)=>logs.push({t:'log',v:a}),info:(...a)=>logs.push({t:'log',v:a})};
  try{ new Function('console',code)(fc); }
  catch(err){ logs.push({t:'err',v:[t().err+err.message]}); }
  if(logs.length===0){out.innerHTML=`<span class="empty">${t().runOk}</span>`;return;}
  out.innerHTML=logs.map(l=>`<div class="line ${l.t==='err'?'err':''}">${escapeHtml(l.v.map(fmt).join(' '))}</div>`).join('');
}
function fmt(v){
  if(typeof v==='string')return v;
  if(v===undefined)return 'undefined';
  if(v===null)return 'null';
  try{return JSON.stringify(v);}catch(e){return String(v);}
}

function checkQuiz(quiz){
  const qs=quiz.querySelectorAll('[data-q]'); let correct=0;
  qs.forEach(q=>{
    const ans=+q.dataset.answer, opts=q.querySelectorAll('.opt');
    opts.forEach(o=>o.classList.remove('correct','wrong'));
    let chosen=-1;
    q.querySelectorAll('input[type=radio]').forEach((r,idx)=>{if(r.checked)chosen=idx;});
    if(chosen===ans){correct++;opts[chosen].classList.add('correct');}
    else if(chosen>=0){opts[chosen].classList.add('wrong');opts[ans].classList.add('correct');}
    else{opts[ans].classList.add('correct');}
  });
  const res=quiz.querySelector('[data-result]'); res.style.display='block';
  const all=qs.length;
  if(correct===all){res.style.color='var(--green)';res.textContent=t().perfect(correct,all);}
  else{res.style.color='var(--accent)';res.textContent=t().partial(correct,all);}
}

const sidebar=document.getElementById('sidebar'), scrim=document.getElementById('scrim');
document.getElementById('menuBtn').onclick=()=>{sidebar.classList.add('open');scrim.classList.add('show');};
scrim.onclick=closeMenu;
function closeMenu(){sidebar.classList.remove('open');scrim.classList.remove('show');}

document.querySelectorAll('.lang button').forEach(b=>{
  b.onclick=()=>{ lang=b.dataset.lang; localStorage.setItem('jsCourseLang',lang); render(); };
});

function bindLiveDemo(){
  const el=document.querySelector('.lesson.active');
  if(!el) return;
  const tx=el.querySelector('#liveDemoText');
  const b1=el.querySelector('#demoBtn1'), b2=el.querySelector('#demoBtn2'), b3=el.querySelector('#demoBtn3');
  const cnt=el.querySelector('#demoCount');
  if(!tx||!b1) return;
  const greet=lang==='ru'
    ?["Привет! 👋","Salom! 🇺🇿","Hello! 🌍","Молодец! 🎓","JavaScript работает! ⚡"]
    :["Salom! 👋","Привет! 🇷🇺","Hello! 🌍","Barakalla! 🎓","JavaScript ishlayapti! ⚡"];
  let gi=0,clicks=0;
  b1.onclick=()=>{tx.textContent=greet[gi%greet.length];gi++;};
  const colors=["#f7df1e","#58a6ff","#3fb950","#f85149","#d2a8ff","#ff7b72"];
  b2.onclick=()=>{tx.style.color=colors[Math.floor(Math.random()*colors.length)];};
  b3.onclick=()=>{clicks++;cnt.textContent=clicks;};
}

/* старт: при переходе по урокам тоже навешиваем демо */
const _goTo=goTo;
goTo=function(i){_goTo(i);bindLiveDemo();};

render();
</script>
